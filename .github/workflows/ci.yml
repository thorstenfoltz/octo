name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      licenses: ${{ steps.filter.outputs.licenses }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
            licenses:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'

  licenses:
    needs: [changes]
    if: needs.changes.outputs.licenses == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Check licenses
        run: cargo deny --all-features check licenses

  test:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libfontconfig1-dev libfreetype6-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # `cargo test` builds every target in the workspace (lib, bin, tests)
      # before running them, so a separate `cargo build` step would just
      # repeat the compilation that `cargo test` is about to do.
      - name: Build and run tests
        run: cargo test

  megalinter:
    needs: [test, licenses]
    if: always() && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run MegaLinter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/tmp/lint" \
            -v "$GITHUB_EVENT_PATH:/tmp/github-event.json:ro" \
            -e DEFAULT_WORKSPACE=/tmp/lint \
            -e MEGALINTER_CONFIG=.mega-linter.yml \
            -e VALIDATE_ALL_CODEBASE=true \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e GITHUB_COMMENT_REPORTER=true \
            -e GITHUB_STATUS_REPORTER=false \
            -e FILEIO_REPORTER=false \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME="$GITHUB_EVENT_NAME" \
            -e GITHUB_EVENT_PATH=/tmp/github-event.json \
            -e GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            -e GITHUB_SHA="$GITHUB_SHA" \
            -e GITHUB_REF="$GITHUB_REF" \
            -e GITHUB_HEAD_REF="$GITHUB_HEAD_REF" \
            -e GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            -e GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            -e GITHUB_API_URL="$GITHUB_API_URL" \
            ghcr.io/oxsecurity/megalinter-rust:v9
