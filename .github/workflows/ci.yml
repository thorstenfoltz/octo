name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  issues: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '**/*.rs'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'

  test:
    needs: [changes]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev libjpeg-dev libopenjp2-7-dev libgumbo-dev libjbig2dec0-dev libmujs-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # `cargo test` builds every target in the workspace (lib, bin, tests)
      # before running them, so a separate `cargo build` step would just
      # repeat the compilation that `cargo test` is about to do.
      - name: Build and run tests
        run: cargo test

  megalinter:
    needs: [test]
    if: always() && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Cache the custom MegaLinter image's layers via the GitHub Actions
      # cache backend. The base image pull and the apk install layer dominate
      # this step's runtime; caching them turns warm runs into seconds instead
      # of minutes.
      #
      # Two precautions to avoid serving stale security updates:
      #  - `pull: true` always re-fetches the upstream `megalinter-rust:v9`
      #    manifest, so a refreshed base image cascades through the apk layer.
      #  - The cache scope rotates weekly (ISO week number). After at most
      #    seven days the apk install layer is rebuilt from scratch, picking
      #    up Alpine package updates even when neither the Dockerfile nor the
      #    base-image digest changed.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute weekly cache scope
        id: cache-scope
        run: echo "week=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Build custom MegaLinter image
        uses: docker/build-push-action@v6
        with:
          context: .github/megalinter-rust/
          tags: custom-megalinter:latest
          load: true
          pull: true
          cache-from: type=gha,scope=megalinter-rust-${{ steps.cache-scope.outputs.week }}
          cache-to: type=gha,mode=max,scope=megalinter-rust-${{ steps.cache-scope.outputs.week }}

      - name: Run MegaLinter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/tmp/lint" \
            -v "$GITHUB_EVENT_PATH:/tmp/github-event.json:ro" \
            -e DEFAULT_WORKSPACE=/tmp/lint \
            -e MEGALINTER_CONFIG=.mega-linter.yml \
            -e VALIDATE_ALL_CODEBASE=true \
            -e GITHUB_TOKEN="$GITHUB_TOKEN" \
            -e GITHUB_COMMENT_REPORTER=true \
            -e GITHUB_STATUS_REPORTER=false \
            -e FILEIO_REPORTER=false \
            -e CI=true \
            -e GITHUB_ACTIONS=true \
            -e GITHUB_EVENT_NAME="$GITHUB_EVENT_NAME" \
            -e GITHUB_EVENT_PATH=/tmp/github-event.json \
            -e GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            -e GITHUB_SHA="$GITHUB_SHA" \
            -e GITHUB_REF="$GITHUB_REF" \
            -e GITHUB_HEAD_REF="$GITHUB_HEAD_REF" \
            -e GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            -e GITHUB_SERVER_URL="$GITHUB_SERVER_URL" \
            -e GITHUB_API_URL="$GITHUB_API_URL" \
            custom-megalinter
