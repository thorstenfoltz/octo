name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MAKEFLAGS: -j4

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          sed -i "s/^version = .*/version = \"$VERSION\"/" Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev libjpeg-dev libopenjp2-7-dev libgumbo-dev libjbig2dec0-dev libmujs-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and test
        run: |
          cargo test --release
          cargo build --release

      - name: Package Linux release
        run: |
          DIR="octo-v${VERSION}-linux-x86_64"
          mkdir -p "$DIR/assets"
          cp target/release/octo "$DIR/"
          cp install.sh "$DIR/"
          cp uninstall.sh "$DIR/"
          cp octo.desktop "$DIR/"
          cp assets/octo.svg "$DIR/assets/"
          cp assets/octo.png "$DIR/assets/"
          cp README.md "$DIR/"
          cp LICENSE "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: octo-v${{ env.VERSION }}-linux-x86_64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set version
        env:
          VERSION: ${{ inputs.version }}
        shell: pwsh
        run: |
          echo "VERSION=$env:VERSION" >> $env:GITHUB_ENV
          (Get-Content Cargo.toml) -replace '^version = .*', "version = `"$env:VERSION`"" | Set-Content Cargo.toml

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build and test
        run: |
          cargo test --release
          cargo build --release

      - name: Package Windows release
        shell: pwsh
        run: |
          $dir = "octo-v$env:VERSION-windows-x86_64"
          New-Item -ItemType Directory -Path "$dir\assets" -Force
          Copy-Item "target\release\octo.exe" "$dir\"
          Copy-Item "install.bat" "$dir\"
          Copy-Item "assets\octo.svg" "$dir\assets\"
          Copy-Item "assets\octo.png" "$dir\assets\"
          Copy-Item "README.md" "$dir\"
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "$dir\" }
          Compress-Archive -Path "$dir\*" -DestinationPath "octo-v$env:VERSION-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: octo-v${{ env.VERSION }}-windows-x86_64.zip

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Octo v$VERSION" \
            --generate-notes \
            --draft \
            artifacts/linux-release/*.tar.gz \
            artifacts/windows-release/*.zip
