# cargo-deny configuration. Run via:
#
#     cargo deny check licenses
#
# The license check is the gate for Octa's MIT license. Adding a crate whose
# license is not in `allow` will fail CI. Copyleft licenses (AGPL, GPL, LGPL,
# SSPL, EUPL) are not on the list — including them would force Octa to
# relicense.

[graph]
all-features = false
no-default-features = false

[licenses]
version = 2
confidence-threshold = 0.93

allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MITNFA",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MPL-2.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
    "0BSD",
]

# Specific crates whose effective license is fine but is reported as a
# composite that the SPDX matcher splits awkwardly. None today.
exceptions = []

[[licenses.clarify]]
# `ring` ships with a mix; treat the combined work as the more permissive
# half. ISC + OpenSSL-style. cargo-deny needs an explicit hash because the
# license file is not in SPDX form.
crate = "ring"
expression = "ISC AND OpenSSL AND MIT"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
